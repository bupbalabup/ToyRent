name: rent_toys
description: Premium Toy Rental Mobile App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.0
  
  # HTTP Client
  dio: ^5.4.0
  
  # WebSocket
  socket_io_client: ^2.0.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI & Animation
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  
  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.9.0
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
